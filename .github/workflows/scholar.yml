name: Update Google Scholar stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch Scholar stats
        run: python scripts/fetch_scholar.py

      - name: Commit updated stats
        run: |
          if [[ -n "$(git status --porcelain scholar-stats.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scholar-stats.json
            git commit -m "chore: update Google Scholar stats"
            git push
          else
            echo "No changes to scholar-stats.json"
          fi
